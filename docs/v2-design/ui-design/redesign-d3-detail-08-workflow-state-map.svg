<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <rect width="1280" height="900" fill="#14161A"/>
  <text x="58" y="56" fill="#D8DDE4" font-family="Arial" font-size="24" font-weight="700">D3 Workflow State Map</text>
  <text x="58" y="86" fill="#8F98A3" font-family="Arial" font-size="14">How the three-pane workbench changes as the user moves through daily mail work.</text>

  <rect x="58" y="134" width="1164" height="112" rx="12" fill="#1E2228" stroke="#343A43"/>
  <text x="90" y="170" fill="#D8DDE4" font-family="Arial" font-size="16" font-weight="700">1. Fetch new mail</text>
  <text x="90" y="200" fill="#AEB7C2" font-family="Arial" font-size="13">Runtime bar shows progress. Left counts update. Center opens the most relevant queue.</text>
  <rect x="896" y="168" width="120" height="34" rx="5" fill="#2B6F88"/>
  <text x="920" y="190" fill="#F4F8FB" font-family="Arial" font-size="12">Fetch New</text>

  <rect x="58" y="272" width="1164" height="112" rx="12" fill="#1E2228" stroke="#4A3B36"/>
  <text x="90" y="308" fill="#F0D4CA" font-family="Arial" font-size="16" font-weight="700">2. Review attention items</text>
  <text x="90" y="338" fill="#AEB7C2" font-family="Arial" font-size="13">Left rail highlights attention counts. Center lists items. Right pane explains why the selected item needs review.</text>
  <rect x="896" y="306" width="120" height="34" rx="5" fill="#2C333D" stroke="#5A4B42"/>
  <text x="930" y="328" fill="#F0D4CA" font-family="Arial" font-size="12">Review</text>

  <rect x="58" y="410" width="1164" height="112" rx="12" fill="#1E2228" stroke="#343A43"/>
  <text x="90" y="446" fill="#D8DDE4" font-family="Arial" font-size="16" font-weight="700">3. Analyze selected items</text>
  <text x="90" y="476" fill="#AEB7C2" font-family="Arial" font-size="13">Center checkboxes select items. Runtime bar shows analysis. Right pane can show selected item or batch state.</text>
  <rect x="896" y="444" width="140" height="34" rx="5" fill="#24303A"/>
  <text x="918" y="466" fill="#D7DCE2" font-family="Arial" font-size="12">Analyze Batch</text>

  <rect x="58" y="548" width="1164" height="112" rx="12" fill="#1E2228" stroke="#343A43"/>
  <text x="90" y="584" fill="#D8DDE4" font-family="Arial" font-size="16" font-weight="700">4. Triage results</text>
  <text x="90" y="614" fill="#AEB7C2" font-family="Arial" font-size="13">Results move into action, waiting, follow-up, notice, thread, or report views. The user selects the next queue.</text>
  <rect x="896" y="582" width="120" height="34" rx="5" fill="#20242A" stroke="#3A414B"/>
  <text x="920" y="604" fill="#B7C0CA" font-family="Arial" font-size="12">Open item</text>

  <rect x="58" y="686" width="1164" height="112" rx="12" fill="#1E2228" stroke="#343A43"/>
  <text x="90" y="722" fill="#D8DDE4" font-family="Arial" font-size="16" font-weight="700">5. Thread and report work</text>
  <text x="90" y="752" fill="#AEB7C2" font-family="Arial" font-size="13">Longer work opens as timeline or report detail. A larger panel can be used when the content needs more room.</text>
  <rect x="896" y="720" width="120" height="34" rx="5" fill="#2B6F88"/>
  <text x="922" y="742" fill="#F4F8FB" font-family="Arial" font-size="12">Open Panel</text>

  <text x="58" y="848" fill="#77808A" font-family="Arial" font-size="12">Design rule: global state lives in the runtime bar; navigation lives left; list scanning lives center; detailed decisions live right.</text>
</svg>