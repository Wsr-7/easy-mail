<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="900" viewBox="0 0 1000 900">
  <rect width="1000" height="900" fill="#14161A"/>
  <text x="54" y="56" fill="#D8DDE4" font-family="Arial" font-size="24" font-weight="700">D3 Component · Right Detail Pane / Review Mode</text>
  <text x="54" y="86" fill="#8F98A3" font-family="Arial" font-size="14">The selected item explains why it is in the queue and exposes item-specific actions.</text>

  <rect x="54" y="124" width="892" height="718" rx="12" fill="#1E2228" stroke="#4A3B36"/>
  <text x="86" y="164" fill="#F0D4CA" font-family="Arial" font-size="18" font-weight="700">Selected mail: manual decision needed</text>
  <text x="86" y="192" fill="#C9A89C" font-family="Arial" font-size="13">Sender · received 09:28 · P0 · blocked until user confirms</text>

  <rect x="86" y="226" width="162" height="36" rx="5" fill="#2C333D" stroke="#5A4B42"/>
  <text x="125" y="249" fill="#F0D4CA" font-family="Arial" font-size="13" font-weight="700">Confirm</text>
  <rect x="260" y="226" width="150" height="36" rx="5" fill="#24303A"/>
  <text x="294" y="249" fill="#D7DCE2" font-family="Arial" font-size="13">Analyze</text>
  <rect x="422" y="226" width="130" height="36" rx="5" fill="#20242A" stroke="#3A414B"/>
  <text x="455" y="249" fill="#B7C0CA" font-family="Arial" font-size="13">Ignore</text>
  <rect x="564" y="226" width="166" height="36" rx="5" fill="#20242A" stroke="#3A414B"/>
  <text x="600" y="249" fill="#B7C0CA" font-family="Arial" font-size="13">Open Digest</text>

  <rect x="86" y="296" width="398" height="128" rx="8" fill="#20242A" stroke="#303740"/>
  <text x="114" y="330" fill="#D8DDE4" font-family="Arial" font-size="15" font-weight="700">Classification</text>
  <rect x="114" y="352" width="68" height="22" rx="4" fill="#4A3B36"/>
  <text x="132" y="367" fill="#F0D4CA" font-family="Arial" font-size="11">P0</text>
  <rect x="194" y="352" width="104" height="22" rx="4" fill="#26323C"/>
  <text x="214" y="367" fill="#D7DCE2" font-family="Arial" font-size="11">must handle</text>
  <text x="114" y="402" fill="#AEB7C2" font-family="Arial" font-size="12">Reason: user decision required before analysis continues.</text>

  <rect x="508" y="296" width="394" height="128" rx="8" fill="#20242A" stroke="#4A3B36"/>
  <text x="536" y="330" fill="#F0D4CA" font-family="Arial" font-size="15" font-weight="700">Security / gating</text>
  <text x="536" y="360" fill="#C9A89C" font-family="Arial" font-size="12">Manual confirmation state is shown inline, not as a noisy popup.</text>
  <text x="536" y="390" fill="#AEB7C2" font-family="Arial" font-size="12">Show rule hit, partial context, or blocked classification here.</text>

  <rect x="86" y="452" width="816" height="144" rx="8" fill="#20242A" stroke="#303740"/>
  <text x="114" y="486" fill="#D8DDE4" font-family="Arial" font-size="15" font-weight="700">Reasoning summary</text>
  <text x="114" y="518" fill="#AEB7C2" font-family="Arial" font-size="13">Explain why this mail is actionable, which queue it belongs to, and what the user should inspect.</text>
  <text x="114" y="548" fill="#8F98A3" font-family="Arial" font-size="12">Keep this concise. Long raw content stays in digest/source documents.</text>

  <rect x="86" y="624" width="816" height="132" rx="8" fill="#20242A" stroke="#303740"/>
  <text x="114" y="658" fill="#D8DDE4" font-family="Arial" font-size="15" font-weight="700">Suggested next step</text>
  <text x="114" y="690" fill="#AEB7C2" font-family="Arial" font-size="13">Primary recommendation appears here. Actions above should map to existing extension commands/message handlers.</text>
  <rect x="114" y="714" width="164" height="30" rx="5" fill="#2B6F88"/>
  <text x="148" y="734" fill="#F4F8FB" font-family="Arial" font-size="12">Generate report</text>
  <rect x="290" y="714" width="128" height="30" rx="5" fill="#20242A" stroke="#3A414B"/>
  <text x="324" y="734" fill="#B7C0CA" font-family="Arial" font-size="12">Open source</text>

  <text x="86" y="808" fill="#77808A" font-family="Arial" font-size="12">Usage: selected-item detail, not global dashboard content. This pane replaces giant mail cards.</text>
</svg>