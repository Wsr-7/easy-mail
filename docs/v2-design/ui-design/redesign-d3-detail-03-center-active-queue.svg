  <text x="86" y="708" fill="#AEB7C2" font-family="Arial" font-size="13">Click row → update right detail pane.</text>
  <text x="86" y="738" fill="#AEB7C2" font-family="Arial" font-size="13">Checkbox → select for batch analysis.</text>
  <text x="86" y="768" fill="#AEB7C2" font-family="Arial" font-size="13">Row body stays compact; long reason, timeline, and report content move right.</text>
  <text x="86" y="798" fill="#AEB7C2" font-family="Arial" font-size="13">Inline buttons are allowed only when they reduce obvious friction, not for every command.</text>
